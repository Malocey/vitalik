<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VG Delikatessen - Wiki Wissens-Graph</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- vis-network library -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        :root {
            --bg-dark: #090d16;
            --card-bg: rgba(22, 30, 49, 0.75);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-purple: #6366f1;
            --accent-blue: #3b82f6;
            --accent-emerald: #10b981;
            --accent-amber: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.12) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 24px;
            overflow: hidden; /* Fullscreen graph scroll lock */
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            height: calc(100vh - 48px);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
        }

        .brand-title {
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #a5b4fc 0%, #6366f1 50%, #38bdf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 4px 12px;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 9999px;
            color: #34d399;
            font-size: 12px;
            font-weight: 600;
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .main-layout {
            display: flex;
            gap: 20px;
            flex-grow: 1;
            min-height: 0; /* Enable flex-child scrolling */
        }

        .graph-panel {
            flex-grow: 1;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            position: relative;
            box-shadow: 0 15px 25px -5px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        #network {
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 30, 0.4);
        }

        .info-panel {
            width: 380px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 15px 25px -5px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 16px;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .panel-header {
            font-family: 'Outfit', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #a5b4fc;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 12px;
            margin-bottom: 4px;
        }

        .note-title {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .note-meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .note-content {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 16px;
            font-size: 14px;
            line-height: 1.6;
            color: #cbd5e1;
            white-space: pre-wrap;
            flex-grow: 1;
            overflow-y: auto;
        }

        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 14px 18px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 12px;
            pointer-events: none;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #94a3b8;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        /* Obsidian-Style Graph view visual tweaks */
        .vis-button {
            background: rgba(99, 102, 241, 0.8) !important;
            border-radius: 6px !important;
            color: white !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="brand-title">
                <span>🥩</span> VG Delikatessen - Ordner-Scanner & RAG System
            </div>
            <div style="display: flex; gap: 16px; align-items: center;">
                <a href="/" style="color: #94a3b8; text-decoration: none; font-weight: 600; font-size: 14px; padding: 8px 16px; background: rgba(255, 255, 255, 0.03); border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.2s;" onmouseover="this.style.color='#f8fafc'; this.style.background='rgba(255,255,255,0.08)'" onmouseout="this.style.color='#94a3b8'; this.style.background='rgba(255,255,255,0.03)'">🏠 Dashboard</a>
                <a href="/rag" style="color: #94a3b8; text-decoration: none; font-weight: 600; font-size: 14px; padding: 8px 16px; background: rgba(255, 255, 255, 0.03); border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.2s;" onmouseover="this.style.color='#f8fafc'; this.style.background='rgba(255,255,255,0.08)'" onmouseout="this.style.color='#94a3b8'; this.style.background='rgba(255,255,255,0.03)'">🔍 RAG Playground</a>
                <a href="/wiki-graph" style="color: #f8fafc; text-decoration: none; font-weight: 600; font-size: 14px; padding: 8px 16px; background: rgba(99, 102, 241, 0.15); border-radius: 10px; border: 1px solid rgba(99, 102, 241, 0.3); transition: all 0.2s;">🕸️ Wiki Graph</a>
            </div>
            <div class="status-badge">
                <span class="pulse-dot"></span>
                <span>Local System Active</span>
            </div>
        </div>

        <!-- Main Layout -->
        <div class="main-layout">
            <!-- Left: Graph Viewer -->
            <div class="graph-panel">
                <div id="network"></div>
                
                <!-- Graph Legend -->
                <div class="legend">
                    <div style="font-weight: 700; color: white; margin-bottom: 4px;">Kategorien</div>
                    <div class="legend-item"><span class="legend-dot" style="background: #a5b4fc;"></span> Persona & Stil</div>
                    <div class="legend-item"><span class="legend-dot" style="background: #34d399;"></span> Buchhaltung</div>
                    <div class="legend-item"><span class="legend-dot" style="background: #fbbf24;"></span> Workflow</div>
                    <div class="legend-item"><span class="legend-dot" style="background: #60a5fa;"></span> Erkenntnisse</div>
                    <div class="legend-item"><span class="legend-dot" style="background: #94a3b8;"></span> Allgemein / Sonstige</div>
                </div>
            </div>

            <!-- Right: Note Viewer -->
            <div class="info-panel">
                <div class="panel-header">📝 Notiz-Details</div>
                <div id="no-note-selected" style="color: var(--text-muted); font-size: 14px; text-align: center; margin-top: 40px;">
                    Klicken Sie auf einen Knoten im Graphen, um den Inhalt der Markdown-Notiz anzuzeigen.
                </div>
                <div id="note-details" style="display: none; height: 100%; flex-direction: column;">
                    <div id="note-title" class="note-title"></div>
                    <div id="note-meta" class="note-meta"></div>
                    <div id="note-content" class="note-content"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let network = null;
        let allPages = {}; // Caches the full page data (content, title, categories)

        // Maps category names to graph colors
        const groupColors = {
            "persona": { background: "rgba(99,102,241,0.2)", border: "#6366f1", highlight: { background: "rgba(99,102,241,0.4)", border: "#818cf8" } },
            "buchhaltung": { background: "rgba(16,185,129,0.2)", border: "#10b981", highlight: { background: "rgba(16,185,129,0.4)", border: "#34d399" } },
            "workflow": { background: "rgba(245,158,11,0.2)", border: "#f59e0b", highlight: { background: "rgba(245,158,11,0.4)", border: "#fbbf24" } },
            "erkenntnis": { background: "rgba(59,130,246,0.2)", border: "#3b82f6", highlight: { background: "rgba(59,130,246,0.4)", border: "#60a5fa" } },
            "allgemein": { background: "rgba(148,163,184,0.2)", border: "#94a3b8", highlight: { background: "rgba(148,163,184,0.4)", border: "#cbd5e1" } }
        };

        window.onload = async function() {
            await loadGraphData();
        }

        async function loadGraphData() {
            try {
                // 1. Fetch wiki pages metadata and contents for the sidebar cache
                const wikiResponse = await fetch("/api/wiki");
                const wikiData = await wikiResponse.json();
                wikiData.pages.forEach(p => {
                    allPages[p.slug] = p;
                });

                // 2. Fetch network graph nodes and edges
                const graphResponse = await fetch("/api/wiki-graph");
                const graphData = await graphResponse.json();

                // 3. Render vis-network
                const container = document.getElementById("network");
                
                // Process node options with colors
                const styledNodes = graphData.nodes.map(node => {
                    const group = node.group ? node.group.toLowerCase() : "allgemein";
                    const colorSet = groupColors[group] || groupColors["allgemein"];
                    
                    return {
                        id: node.id,
                        label: node.label,
                        shape: "box",
                        font: {
                            color: "#f8fafc",
                            face: "Inter",
                            size: 14,
                            bold: { color: "#f8fafc" }
                        },
                        margin: 10,
                        borderWidth: 1.5,
                        color: {
                            background: colorSet.background,
                            border: colorSet.border,
                            highlight: colorSet.highlight
                        },
                        shadow: {
                            enabled: true,
                            color: "rgba(0,0,0,0.4)",
                            size: 6,
                            x: 2,
                            y: 2
                        }
                    };
                });

                const data = {
                    nodes: new vis.DataSet(styledNodes),
                    edges: new vis.DataSet(graphData.edges.map(edge => ({
                        from: edge.from,
                        to: edge.to,
                        arrows: "to",
                        color: { color: "rgba(99, 102, 241, 0.4)", highlight: "#6366f1" },
                        width: 1.5
                    })))
                };

                const options = {
                    interaction: {
                        hover: true,
                        tooltipDelay: 200
                    },
                    physics: {
                        barnesHut: {
                            gravitationalConstant: -1800,
                            centralGravity: 0.15,
                            springLength: 120,
                            springConstant: 0.04,
                            damping: 0.09
                        },
                        stabilization: {
                            iterations: 150
                        }
                    }
                };

                network = new vis.Network(container, data, options);

                // Event listener on node selection
                network.on("selectNode", function(params) {
                    if (params.nodes.length > 0) {
                        showNodeDetails(params.nodes[0]);
                    }
                });

                network.on("deselectNode", function() {
                    hideNodeDetails();
                });

            } catch (error) {
                console.error("Fehler beim Laden des Wiki-Graphen:", error);
                alert("Der Wiki-Graph konnte nicht geladen werden.");
            }
        }

        function showNodeDetails(slug) {
            const page = allPages[slug];
            if (!page) return;

            document.getElementById("no-note-selected").style.display = "none";
            
            document.getElementById("note-title").textContent = page.title;
            document.getElementById("note-meta").textContent = `Slug: ${page.slug} | Format: Markdown`;
            document.getElementById("note-content").textContent = page.content;
            
            document.getElementById("note-details").style.display = "flex";
        }

        function hideNodeDetails() {
            document.getElementById("note-details").style.display = "none";
            document.getElementById("no-note-selected").style.display = "block";
        }
    </script>
</body>
</html>
